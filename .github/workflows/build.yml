name: Build Debug APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download proot binary
        run: |
          chmod +x scripts/get_proot.sh
          ./scripts/get_proot.sh

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Copy APK to build/
        run: |
          mkdir -p build
          cp app/build/outputs/apk/debug/app-arm64-v8a-debug.apk \
             build/mopio-debug.apk

      - name: Commit APK to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build/mopio-debug.apk
          if git diff --cached --quiet; then
            echo "APK unchanged, skipping commit"
          else
            git commit -m "ci: update build/mopio-debug.apk [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mopio-debug-apk
          path: build/mopio-debug.apk
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 14
